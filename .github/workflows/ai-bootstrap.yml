name: Apply AI research NAS worker bundle

on:
  push:
    branches:
      - agent/ai-research-nas-worker
    paths:
      - .ai-bootstrap/**
      - .github/workflows/ai-bootstrap.yml

permissions:
  contents: write

jobs:
  apply-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-research-nas-worker
          fetch-depth: 0

      - name: Reconstruct and verify bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .ai-bootstrap/part-* | base64 --decode > /tmp/aiwork-bundle.tgz
          echo "46083445ab7cc0d42e649fc47b077795ae5714d7b183bba4ee466c1a605c5049  /tmp/aiwork-bundle.tgz" | sha256sum --check --strict
          tar -xzf /tmp/aiwork-bundle.tgz -C .

      - name: Commit expanded implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .ai-bootstrap .github/workflows/ai-bootstrap.yml
          git config user.name "quant-lab automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Add NAS-backed AI research plane"
          git push origin HEAD:agent/ai-research-nas-worker
