services:
  quant-ai-worker:
    build:
      context: ../..
      dockerfile: deploy/nas_ai_worker/Dockerfile
    container_name: quant-ai-worker
    restart: unless-stopped
    env_file:
      - .env
    mem_limit: 2g
    cpus: 1.5
    pids_limit: 128
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    volumes:
      - ./data:/data
      - ./secrets/id_ed25519:/run/secrets/qlab_ssh_key:ro
      - ./secrets/known_hosts:/run/secrets/known_hosts:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
