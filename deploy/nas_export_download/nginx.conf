server {
    listen 8788;
    server_name _;
    client_max_body_size 1m;
    auth_basic "Expert Pack NAS";
    auth_basic_user_file /run/secrets/download.htpasswd;

    location = /healthz {
        auth_basic off;
        proxy_pass http://download-api:8080/healthz;
    }

    location / {
        proxy_pass http://download-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /_protected/ {
        internal;
        alias /exports/accepted/;
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges bytes always;
        add_header X-Content-Type-Options nosniff always;
    }
}
