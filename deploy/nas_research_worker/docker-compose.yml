services:
  quant-research-worker:
    build:
      context: ../..
      dockerfile: deploy/nas_research_worker/Dockerfile
      args:
        BUILD_GIT_COMMIT: ${BUILD_GIT_COMMIT:?set BUILD_GIT_COMMIT to the deployed full SHA}
        BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
    container_name: quant-research-worker
    restart: unless-stopped
    env_file:
      - .env
    cpus: 3.0
    mem_limit: ${NAS_RESEARCH_WORKER_MEMORY_LIMIT:-8g}
    pids_limit: 256
    read_only: true
    user: "10004:10004"
    group_add:
      - "10002"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
    volumes:
      - ${NAS_RESEARCH_DATA_HOST_PATH:-./data}:/data
      - ${NAS_RUNTIME_HOST_PATH:-../quant-runtime}:/runtime
      - ${NAS_RESEARCH_SECRETS_HOST_PATH:-./secrets}/id_ed25519:/run/secrets/qlab_ssh_key:ro
      - ${NAS_RESEARCH_SECRETS_HOST_PATH:-./secrets}/known_hosts:/run/secrets/known_hosts:ro
      - ${NAS_RESEARCH_SECRETS_HOST_PATH:-./secrets}/cloud_research_task_public_key:/run/secrets/cloud_research_task_public_key:ro
      - ${NAS_RESEARCH_SECRETS_HOST_PATH:-./secrets}/nas_research_signing_key:/run/secrets/nas_research_signing_key:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os,pathlib; assert pathlib.Path('/data').is_dir(); assert len(os.environ['QUANT_RESEARCH_WORKER_COMMIT']) == 40; assert os.environ.get('QUANT_RESEARCH_FACTOR_FACTORY_ENABLED', '0') in {'0', '1'}"
      interval: 30s
      timeout: 5s
      retries: 3
    stop_grace_period: 90s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
